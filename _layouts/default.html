<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  {% feed_meta %}
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if page.math %}{% include katex.html %}{% endif %}
</head>
<body>
  <nav class="site-nav">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <div class="nav-links">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>About</a>
      <a href="{{ '/articles/' | relative_url }}"{% if page.url contains '/articles' %} class="active"{% endif %}>Articles</a>
      <a href="{{ '/projects/' | relative_url }}"{% if page.url contains '/projects' %} class="active"{% endif %}>Projects</a>
    </div>
  </nav>

  <main class="{{ page.width | default: 'narrow' }}">
    {{ content }}
  </main>

  <footer>
    <span>© {{ 'now' | date: "%Y" }} {{ site.author.name }}</span>
    <div class="footer-links">
      <a href="mailto:{{ site.author.email }}">Email</a>
      <a href="https://github.com/{{ site.github_username }}">GitHub</a>
      {% if site.linkedin_url %}<a href="{{ site.linkedin_url }}">LinkedIn</a>{% endif %}
    </div>
  </footer>
</body>
</html>
