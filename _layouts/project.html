---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  {% if page.tags and page.tags.size > 0 %}
  <div class="tags">
    {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
  </div>
  {% endif %}
  <div class="prose">
    {{ content }}
  </div>
  {% if page.link %}
  <p><a class="more" href="{{ page.link }}">Visit project →</a></p>
  {% endif %}
</article>
